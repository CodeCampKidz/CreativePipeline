services:
  # Web UI — marketing teams upload briefs via browser
  web:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    command: web
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # CLI pipeline — run a specific brief (one-shot)
  # Usage: docker compose run --rm pipeline generate data/briefs/sample_brief.yaml
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    profiles: ["cli"]
    entrypoint: ["python", "-m", "src.cli"]
    command: generate data/briefs/sample_brief.yaml --skip-genai
