name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Format check with ruff
        run: ruff format --check src/ tests/

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing --tb=short
        env:
          OPENAI_API_KEY: "sk-test-fake-key-for-ci"

      - name: Smoke test - validate brief
        run: python -m src.cli validate data/briefs/sample_brief.yaml

      - name: Smoke test - skip-genai run
        run: python -m src.cli generate data/briefs/sample_brief.yaml --skip-genai
